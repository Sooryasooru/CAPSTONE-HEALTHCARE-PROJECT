services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    working_dir: /app/src
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./src:/app/src

  merged_app:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: python -m dashboard.merged_app
    working_dir: /app/src
    ports:
      - "8060:8060"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./src:/app/src

  doctor_app:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: python -m dashboard.doctor_app
    working_dir: /app/src
    ports:
      - "8051:8051"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./src:/app/src

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: streamlit run rag/chat_app.py --server.port 8501 --server.address 0.0.0.0 --server.enableCORS false --server.enableXsrfProtection false
    working_dir: /app/src
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./src:/app/src

  agent_app:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: uvicorn agent.service:app --host 0.0.0.0 --port 8062
    working_dir: /app
    ports:
      - "8062:8062"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - fastapi
      - merged_app
      - doctor_app
      - streamlit
      - agent_app
    volumes:
      - ./frontend:/app
      - /app/node_modules
